<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynx Ledger • Тихий учет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #F6F5F0;      /* Теплый камень */
            --bg-card: #FFFFFF;
            --text-main: #2C2C2C;    /* Графит */
            --text-muted: #7A7A7A;
            --lynx-green: #556B5B;   /* Лесной шалфей (Доходы) */
            --lynx-purple: #6B5B73;  /* Сланцевый фиолетовый (Баланс) */
            --lynx-red: #8C5A5A;     /* Терракота (Расходы) */
            --border: #E8E8E3;
            --shadow: 0 8px 30px rgba(44, 44, 44, 0.04);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, .serif {
            font-family: 'Lora', serif;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .navbar {
            background-color: transparent !important;
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
        }
        .navbar-brand {
            font-family: 'Lora', serif;
            font-size: 1.5rem;
            color: var(--text-main) !important;
            font-weight: 500;
        }
        .navbar-brand span {
            color: var(--lynx-green);
            font-style: italic;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(44, 44, 44, 0.08);
        }

        .btn {
            border-radius: 12px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: var(--lynx-green);
            border-color: var(--lynx-green);
        }
        .btn-primary:hover {
            background-color: #46594B;
            border-color: #46594B;
            transform: translateY(-1px);
        }
        .btn-outline-light {
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-outline-light:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            background-color: #FCFCFA;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--lynx-green);
            box-shadow: 0 0 0 3px rgba(85, 107, 91, 0.1);
            background-color: #fff;
        }

        .text-income { color: var(--lynx-green) !important; }
        .text-expense { color: var(--lynx-red) !important; }
        .text-balance { color: var(--lynx-purple) !important; }
        
        .badge-lynx {
            background-color: rgba(85, 107, 91, 0.1);
            color: var(--lynx-green);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        blockquote {
            border-left: 3px solid var(--lynx-green);
            padding-left: 1rem;
            color: var(--text-muted);
            font-style: italic;
            font-family: 'Lora', serif;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Lynx <span>Ledger</span></a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm" style="display:none;">Выйти</button>
        </div>
    </nav>
    <div class="container fade-in">
        {% block content %}{% endblock %}
    </div>
    
    <footer class="text-center mt-5 mb-4 text-muted small serif">
        <p>«Управляй ресурсами тихо. Закапывай добычу про запас.» 🐾</p>
    </footer>

    <script>
        const token = localStorage.getItem('token');
        if (token) document.getElementById('logoutBtn').style.display = 'block';
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/';
        });
    </script>
</body>
</html>
