{% extends "base.html" %}
{% block content %}
<div id="noSpaceMsg" class="alert text-center border-0 shadow-sm p-4" style="display:none; background: rgba(107, 91, 115, 0.05); border-radius: 20px;">
    <p class="mb-3 serif fs-5">У вас пока нет общих пространств.</p>
    <a href="/join" class="btn btn-outline-secondary me-2">Присоединиться по коду</a> 
    <button onclick="createSpace()" class="btn btn-primary">Создать пространство</button>
</div>

<div id="dashboardContent" style="display:none;">
    <!-- Заголовок и Инвайт -->
    <div class="card p-4 mb-4 border-0">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div>
                <label class="text-muted small text-uppercase" style="letter-spacing: 0.1em;">Текущее пространство</label>
                <select id="spaceSelect" class="form-select form-select-lg border-0 fw-bold serif ps-0" style="width: auto; background: transparent; font-size: 2rem; color: var(--text-main);"></select>
            </div>
            
            <div id="inviteBlock" class="text-end" style="display:none;">
                <label class="text-muted small text-uppercase" style="letter-spacing: 0.1em;">Код приглашения</label>
                <div class="d-flex align-items-center gap-3 justify-content-end mt-1">
                    <code id="inviteCodeText" class="fs-3 text-balance serif fw-bold"></code>
                    <button onclick="copyInviteCode()" class="btn btn-sm btn-outline-secondary">Скопировать</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Баланс -->
    <div class="row g-4 mb-4">
        <div class="col-md-12">
            <div class="card p-5 text-center border-0" style="background: linear-gradient(135deg, #F6F5F0 0%, #EBEAE2 100%);">
                <p class="text-muted small text-uppercase mb-2">Общий баланс</p>
                <h1 id="balanceDisplay" class="display-3 serif text-balance mb-4">0 ₽</h1>
                <div class="d-flex justify-content-center gap-5">
                    <div>
                        <p class="small text-muted mb-1">Доходы</p>
                        <h4 id="incomeDisplay" class="serif text-income">0 ₽</h4>
                    </div>
                    <div style="width: 1px; background: var(--border);"></div>
                    <div>
                        <p class="small text-muted mb-1">Расходы</p>
                        <h4 id="expenseDisplay" class="serif text-expense">0 ₽</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Действия и Аналитика -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card p-4 h-100 border-0">
                <h5 class="serif mb-3">Новая операция</h5>
                <form id="txForm">
                    <div class="mb-3">
                        <input type="number" step="0.01" id="txAmount" class="form-control form-control-lg serif" placeholder="Сумма" required>
                    </div>
                    <div class="mb-3">
                        <select id="txType" class="form-select">
                            <option value="expense">Расход</option>
                            <option value="income">Доход</option>
                        </select>
                    </div>
                    <div class="mb-3"><input type="text" id="txCategory" class="form-control" placeholder="Категория (Еда, Транспорт...)" required></div>
                    <div class="mb-4"><input type="text" id="txDesc" class="form-control" placeholder="Комментарий"></div>
                    <button type="submit" class="btn btn-primary w-100">Добавить</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4 h-100 border-0">
                <h5 class="serif mb-3">Доля расходов по участникам</h5>
                <div class="d-flex justify-content-center align-items-center h-100">
                    <canvas id="expenseChart" style="max-height: 250px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Лента -->
    <div class="card p-4 border-0">
        <h5 class="serif mb-3">История операций</h5>
        <div class="table-responsive">
            <table class="table table-borderless align-middle">
                <thead>
                    <tr class="text-muted small text-uppercase">
                        <th>Участник</th>
                        <th>Категория</th>
                        <th>Комментарий</th>
                        <th class="text-end">Сумма</th>
                        <th class="text-end">Дата</th>
                    </tr>
                </thead>
                <tbody id="txTableBody" class="serif fs-5"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let chartInstance = null;
    let currentSpaceId = null;

    async function api(endpoint, method='GET', body=null) {
        const opts = { method, headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`} };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(endpoint, opts);
        if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/'; }
        return await res.json();
    }

    async function loadSpaces() {
        const spaces = await api('/spaces/my');
        const sel = document.getElementById('spaceSelect');
        const inviteBlock = document.getElementById('inviteBlock');
        
        sel.innerHTML = '';
        inviteBlock.style.display = 'none';

        if (spaces.length === 0) {
            document.getElementById('noSpaceMsg').style.display = 'block';
            document.getElementById('dashboardContent').style.display = 'none';
            return;
        }
        
        document.getElementById('noSpaceMsg').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
        
        window.mySpaces = {}; 
        spaces.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            sel.appendChild(opt);
            window.mySpaces[s.id] = s.invite_code;
        });

        sel.onchange = (e) => { 
            currentSpaceId = e.target.value; 
            updateInviteCode();
            loadStats(); 
        };
        
        currentSpaceId = sel.value;
        updateInviteCode();
        loadStats();
    }

    function updateInviteCode() {
        const code = window.mySpaces[currentSpaceId];
        const block = document.getElementById('inviteBlock');
        if (code) {
            document.getElementById('inviteCodeText').textContent = code;
            block.style.display = 'block';
        } else {
            block.style.display = 'none';
        }
    }

    function copyInviteCode() {
        const code = document.getElementById('inviteCodeText').textContent;
        navigator.clipboard.writeText(code).then(() => {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Скопировано ✓';
            setTimeout(() => btn.textContent = originalText, 2000);
        });
    }

    async function loadStats() {
        if (!currentSpaceId) return;
        const stats = await api(`/transactions/space/${currentSpaceId}`);
        
        document.getElementById('balanceDisplay').textContent = `${stats.balance.toFixed(0)} ₽`;
        document.getElementById('incomeDisplay').textContent = `${stats.total_income.toFixed(0)} ₽`;
        document.getElementById('expenseDisplay').textContent = `${stats.total_expense.toFixed(0)} ₽`;

        // График
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        const labels = Object.keys(stats.user_breakdown);
        const data = labels.map(u => stats.user_breakdown[u].expense);
        
        const colors = ['#556B5B', '#8C5A5A', '#6B5B73', '#A89F91', '#46594B']; 
        
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels, 
                datasets: [{ 
                    data, 
                    backgroundColor: colors.slice(0, labels.length),
                    borderWidth: 0,
                    hoverOffset: 10
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { family: 'Lora', size: 14 }, padding: 20, usePointStyle: true }
                    }
                }
            }
        });

        // Таблица
        const tbody = document.getElementById('txTableBody');
        tbody.innerHTML = '';
        stats.transactions.forEach(tx => {
            const colorClass = tx.type === 'income' ? 'text-income' : 'text-expense';
            const sign = tx.type === 'income' ? '+' : '-';
            const row = `<tr>
                <td class="fw-bold">${tx.username}</td>
                <td>${tx.category}</td>
                <td class="text-muted fst-italic">${tx.description || '—'}</td>
                <td class="text-end fw-bold ${colorClass}">${sign}${tx.amount} ₽</td>
                <td class="text-end text-muted small" style="font-family: 'Inter', sans-serif;">${new Date(tx.created_at).toLocaleDateString()}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    document.getElementById('txForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await api('/transactions/add', 'POST', {
            amount: parseFloat(document.getElementById('txAmount').value),
            type: document.getElementById('txType').value,
            category: document.getElementById('txCategory').value,
            description: document.getElementById('txDesc').value,
            space_id: parseInt(currentSpaceId)
        });
        e.target.reset();
        loadStats();
    });

    async function createSpace() {
        const name = prompt("Название пространства:", "Семейный бюджет");
        if (!name) return;
        const res = await api('/spaces/create', 'POST', { name });
        if (res.id) {
            loadSpaces();
        }
    }

    loadSpaces();
    setInterval(loadStats, 5000);
</script>
{% endblock %}
