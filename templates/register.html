{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4">Регистрация</h3>
            <form id="regForm">
                <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="Придумайте логин" required></div>
                <div class="mb-3"><input type="password" id="password" class="form-control" placeholder="Придумайте пароль" required></div>
                <button type="submit" class="btn btn-success w-100">Создать аккаунт</button>
            </form>
            <p class="mt-3 text-center">Уже есть? <a href="/">Войти</a></p>
        </div>
    </div>
</div>
<script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        if (res.ok) { alert('Аккаунт создан! Теперь войдите.'); window.location.href = '/'; }
        else { alert('Ошибка регистрации.'); }
    });
</script>
{% endblock %}
