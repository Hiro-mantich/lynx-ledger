{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4">Вход</h3>
            <form id="loginForm">
                <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="Логин" required></div>
                <div class="mb-3"><input type="password" id="password" class="form-control" placeholder="Пароль" required></div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <p class="mt-3 text-center">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('token', data.access_token);
            window.location.href = '/dashboard';
        } else {
            alert('Ошибка входа. Проверьте логин/пароль.');
        }
    });
</script>
{% endblock %}
